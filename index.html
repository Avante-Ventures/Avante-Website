<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Site-level baseline. Per-route title / description / canonical /
         OG-title / OG-description / OG-url / OG-image / OG-locale /
         twitter-title / twitter-description are injected at runtime by
         react-helmet-async (src/app/components/SEOHelmet.tsx) and captured
         at build time by the Puppeteer prerender. The previous static
         description here was producing a DUPLICATE meta tag in the DOM
         alongside the per-route one — Google was reading the static one
         first, defeating per-page descriptions. Same logic applies to
         og:image (now also per-route only). -->
    <title>Avante Ventures</title>
    <meta name="theme-color" content="#06070d" />
    <meta name="color-scheme" content="dark" />

    <!-- Editorial typography: Funnel Display (display) + Bricolage Grotesque (body) + JetBrains Mono (labels). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300;400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Favicons + PWA manifest -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- OpenGraph site-level (overridable per page).
         og:locale, og:locale:alternate, AND og:image are emitted per-route
         by SEOHelmet — keep them out of the static HTML so we don't get
         duplicate tags. og:image:width/height/alt stay here as static
         metadata about the default image (SEOHelmet uses it by default). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Avante Ventures" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Avante Ventures — AI-native venture studio for Brazil" />

    <!-- Twitter Card site-level -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://avanteventures.com/og-image.png" />

    <!-- robots is now emitted per-route by SEOHelmet so individual pages
         (e.g. unpublished stub articles) can flip to noindex without
         producing a duplicate meta robots tag in the DOM. -->


    <!-- JSON-LD: Organization (primary entity).
         GEO enrichment (May 2026): added `sameAs` (LinkedIn company),
         `founder` array (4 named Person entities each with their own
         LinkedIn `sameAs`), `address` (São Paulo HQ), `numberOfEmployees`,
         and `es` to knowsLanguage. Each Person gets its own @id so future
         Article schemas can `author: { "@id": "..." }` instead of nesting. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://avanteventures.com/#organization",
      "name": "Avante Ventures",
      "alternateName": "Avante",
      "url": "https://avanteventures.com/",
      "logo": "https://avanteventures.com/apple-touch-icon.png",
      "image": "https://avanteventures.com/og-image.png",
      "description": "AI-native venture studio combining Silicon Valley playbooks with Brazil-native execution. We co-found AI-native companies from scratch, built to compound for decades.",
      "slogan": "Silicon Valley Playbooks. Brazil-Native Execution.",
      "foundingDate": "2025",
      "numberOfEmployees": { "@type": "QuantitativeValue", "minValue": 4, "maxValue": 10 },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "São Paulo",
        "addressRegion": "SP",
        "addressCountry": "BR"
      },
      "areaServed": [
        { "@type": "Country", "name": "Brazil" },
        { "@type": "Country", "name": "United States" },
        { "@type": "Place", "name": "Latin America" }
      ],
      "knowsAbout": [
        "Venture Capital",
        "Venture Building",
        "Venture Studios",
        "Artificial Intelligence",
        "AI-Native Startups",
        "Pre-traction Capital",
        "Brazil Startup Ecosystem",
        "LATAM Technology",
        "Founder Operational Support",
        "Workflow Automation",
        "AI for Service Economies"
      ],
      "knowsLanguage": ["en", "pt-BR", "es"],
      "sameAs": [
        "https://www.linkedin.com/company/avante-ventures/"
      ],
      "founder": [
        {
          "@type": "Person",
          "@id": "https://avanteventures.com/#amanda-pinheiro",
          "name": "Amanda Pinheiro",
          "jobTitle": "Co-Founder & Managing Partner",
          "worksFor": { "@id": "https://avanteventures.com/#organization" },
          "sameAs": ["https://www.linkedin.com/in/amandafmpinheiro/"]
        },
        {
          "@type": "Person",
          "@id": "https://avanteventures.com/#andrea-barrica",
          "name": "Andrea Barrica",
          "jobTitle": "Co-Founder & Operating Partner",
          "worksFor": { "@id": "https://avanteventures.com/#organization" },
          "sameAs": ["https://www.linkedin.com/in/andreabarrica/"]
        },
        {
          "@type": "Person",
          "@id": "https://avanteventures.com/#felipe-moraes",
          "name": "Felipe Moraes",
          "jobTitle": "Venture Partner",
          "worksFor": { "@id": "https://avanteventures.com/#organization" },
          "sameAs": ["https://www.linkedin.com/in/felipe-moraes/"]
        },
        {
          "@type": "Person",
          "@id": "https://avanteventures.com/#jess-mah",
          "name": "Jess Mah",
          "jobTitle": "Strategic Advisor",
          "worksFor": { "@id": "https://avanteventures.com/#organization" },
          "sameAs": ["https://www.linkedin.com/in/jessmah/"]
        }
      ],
      "contactPoint": [{
        "@type": "ContactPoint",
        "email": "cristian@avanteventures.com",
        "contactType": "general inquiries",
        "availableLanguage": ["en", "pt", "es"]
      }]
    }
    </script>

    <!-- JSON-LD: WebSite (search action + sitelinks signal) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://avanteventures.com/#website",
      "url": "https://avanteventures.com/",
      "name": "Avante Ventures",
      "description": "AI-native venture studio. Silicon Valley Playbooks. Brazil-Native Execution.",
      "publisher": { "@id": "https://avanteventures.com/#organization" },
      "inLanguage": ["en", "pt-BR", "es"]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
