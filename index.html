<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>Avante Ventures — AI-native Venture Studio in Brazil</title>
    <meta name="description" content="We co-found AI-native companies from scratch. Silicon Valley playbooks, Brazil-native execution. Built to compound for decades." />
    <link rel="canonical" href="https://avanteventures.com/" />
    <meta name="theme-color" content="#151E35" />
    <meta name="color-scheme" content="dark" />

    <!-- Favicons + PWA manifest -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- OpenGraph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://avanteventures.com/" />
    <meta property="og:site_name" content="Avante Ventures" />
    <meta property="og:title" content="Avante Ventures — AI-native Venture Studio in Brazil" />
    <meta property="og:description" content="We co-found AI-native companies from scratch. Silicon Valley playbooks, Brazil-native execution." />
    <meta property="og:image" content="https://avanteventures.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Avante Ventures — AI-native venture studio for Brazil" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://avanteventures.com/" />
    <meta name="twitter:title" content="Avante Ventures — AI-native Venture Studio in Brazil" />
    <meta name="twitter:description" content="We co-found AI-native companies from scratch. Silicon Valley playbooks, Brazil-native execution." />
    <meta name="twitter:image" content="https://avanteventures.com/og-image.png" />

    <!-- Hint search engines about indexing preferences -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- JSON-LD: Organization (primary entity) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://avanteventures.com/#organization",
      "name": "Avante Ventures",
      "alternateName": "Avante",
      "url": "https://avanteventures.com/",
      "logo": "https://avanteventures.com/apple-touch-icon.png",
      "image": "https://avanteventures.com/og-image.png",
      "description": "AI-native venture studio combining Silicon Valley playbooks with Brazil-native execution. We co-found AI-native companies from scratch, built to compound for decades.",
      "slogan": "Silicon Valley Playbooks. Brazil-Native Execution.",
      "foundingDate": "2025",
      "areaServed": [
        { "@type": "Country", "name": "Brazil" },
        { "@type": "Country", "name": "United States" },
        { "@type": "Place", "name": "Latin America" }
      ],
      "knowsAbout": [
        "Venture Capital",
        "Venture Building",
        "Venture Studios",
        "Artificial Intelligence",
        "AI-Native Startups",
        "Pre-traction Capital",
        "Brazil Startup Ecosystem",
        "LATAM Technology",
        "Founder Operational Support",
        "Workflow Automation",
        "AI for Service Economies"
      ],
      "knowsLanguage": ["en", "pt-BR"],
      "contactPoint": [{
        "@type": "ContactPoint",
        "email": "cristian@avanteventures.com",
        "contactType": "general inquiries",
        "availableLanguage": ["en", "pt"]
      }]
    }
    </script>

    <!-- JSON-LD: WebSite (search action + sitelinks signal) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://avanteventures.com/#website",
      "url": "https://avanteventures.com/",
      "name": "Avante Ventures",
      "description": "AI-native venture studio. Silicon Valley Playbooks. Brazil-Native Execution.",
      "publisher": { "@id": "https://avanteventures.com/#organization" },
      "inLanguage": ["en", "pt-BR"]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
